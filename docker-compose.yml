# 本文件定义 PostgreSQL、一次性迁移、API 与单个 scheduler-worker 的同机部署拓扑。
x-app-environment: &app-environment
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xcomments}:${POSTGRES_PASSWORD:?请在 .env 中设置 PostgreSQL 密码}@postgres:5432/${POSTGRES_DB:-x_comments}
  XIANYU_STORAGE_STATE_PATH: /app/storage_state.json
  XIANYU_HEADLESS: "false"
  XIANYU_MAX_PAGES: "3"
  XIANYU_MAX_ITEMS: "50"
  XIANYU_DETAIL_IMAGE_BUDGET_SECONDS: "${XIANYU_DETAIL_IMAGE_BUDGET_SECONDS:-30}"
  XIANYU_PAGE_DELAY_SECONDS: "2.0"
  XIANYU_VERIFY_TIMEOUT_SECONDS: "12"
  CATALOG_MISSING_THRESHOLD: "${CATALOG_MISSING_THRESHOLD:-2}"
  CATALOG_SCHEDULER_INTERVAL_SECONDS: "${CATALOG_SCHEDULER_INTERVAL_SECONDS:-600}"
  WORKER_POLL_SECONDS: "${WORKER_POLL_SECONDS:-5}"
  LOG_LEVEL: INFO

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-x_comments}
      POSTGRES_USER: ${POSTGRES_USER:-xcomments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 PostgreSQL 密码}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "true"
      MIGRATE_ONLY: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      # shopping 与 x-comments 部署在同一台服务器，Catalog Sync 只需宿主机回环访问。
      - "127.0.0.1:8000:8000"
    environment:
      <<: *app-environment
      APP_ROLE: api
      RUN_MIGRATIONS: "false"
      XIANYU_API_TOKEN: "${XIANYU_API_TOKEN:-}"
      CATALOG_SYNC_TOKEN: "${CATALOG_SYNC_TOKEN:-}"
      PROCUREMENT_API_TOKEN: "${PROCUREMENT_API_TOKEN:-}"
      PROCUREMENT_SOURCE_ITEM_ALLOWLIST: "${PROCUREMENT_SOURCE_ITEM_ALLOWLIST:-}"
    volumes:
      - ./storage_state.json:/app/storage_state.json:ro
    networks:
      default: {}
      commerce_internal:
        aliases:
          - x-comments-api
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  scheduler-worker:
    build: .
    environment:
      <<: *app-environment
      APP_ROLE: scheduler_worker
      RUN_MIGRATIONS: "false"
      PROCUREMENT_CHAT_ENABLED: "${PROCUREMENT_CHAT_ENABLED:-false}"
      PROCUREMENT_AUTO_SEND_ENABLED: "${PROCUREMENT_AUTO_SEND_ENABLED:-false}"
      PROCUREMENT_AUTO_SEND_MIN_CONFIDENCE: "${PROCUREMENT_AUTO_SEND_MIN_CONFIDENCE:-0.85}"
      PROCUREMENT_MAX_AUTO_ROUNDS: "${PROCUREMENT_MAX_AUTO_ROUNDS:-3}"
      PROCUREMENT_WORKER_POLL_SECONDS: "${PROCUREMENT_WORKER_POLL_SECONDS:-5}"
      PROCUREMENT_TASK_LEASE_SECONDS: "${PROCUREMENT_TASK_LEASE_SECONDS:-90}"
      PROCUREMENT_SELLER_POLL_SECONDS: "${PROCUREMENT_SELLER_POLL_SECONDS:-15}"
      PROCUREMENT_OUTBOX_MAX_ATTEMPTS: "${PROCUREMENT_OUTBOX_MAX_ATTEMPTS:-8}"
      # Worker 与 API 必须使用同一单商品白名单；缺失时 Worker 会失败关闭所有 Canary。
      PROCUREMENT_SOURCE_ITEM_ALLOWLIST: "${PROCUREMENT_SOURCE_ITEM_ALLOWLIST:-}"
      XIANYU_EXPECTED_ACCOUNT_ID: "${XIANYU_EXPECTED_ACCOUNT_ID:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-v4-flash}"
      DEEPSEEK_TIMEOUT_SECONDS: "${DEEPSEEK_TIMEOUT_SECONDS:-15}"
      SHOPPING_CALLBACK_URL: "${SHOPPING_CALLBACK_URL:-}"
      SHOPPING_PROCUREMENT_TOKEN: "${SHOPPING_PROCUREMENT_TOKEN:-}"
    volumes:
      - ./storage_state.json:/app/storage_state.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      default: {}
      commerce_internal: {}
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  commerce_internal:
    external: true
    name: commerce_internal
